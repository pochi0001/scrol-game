<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Side Scroller</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #87ceeb 0%, #dff5ff 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      color: #1f2937;
    }
    .wrap {
      width: min(100%, 980px);
      padding: 20px;
    }
    .title {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      margin: 8px 0 10px;
    }
    .sub {
      margin: 0 0 16px;
      line-height: 1.6;
    }
    .hud {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .pill {
      background: rgba(255,255,255,.86);
      border: 2px solid rgba(0,0,0,.08);
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }
    .game-shell {
      background: rgba(255,255,255,.2);
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,.12);
      backdrop-filter: blur(6px);
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 18px;
      background: linear-gradient(180deg, #8fd3ff 0%, #c9f0ff 60%, #d8f7c4 60%, #b4e391 100%);
      border: 3px solid rgba(255,255,255,.8);
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .card {
      background: rgba(255,255,255,.86);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }
    .card strong { display: block; margin-bottom: 6px; }
    .touch-controls {
      display: none;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin-top: 14px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    .touch-left,
    .touch-right {
      display: flex;
      gap: 10px;
    }
    .touch-btn {
      width: 78px;
      height: 78px;
      border: none;
      border-radius: 22px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 12px 24px rgba(0,0,0,.14);
      font-size: 30px;
      font-weight: 800;
      color: #111827;
      touch-action: manipulation;
    }
    .touch-btn:active {
      transform: scale(0.97);
    }
    .touch-btn.jump {
      width: 92px;
      height: 92px;
      border-radius: 999px;
      font-size: 18px;
      letter-spacing: .04em;
    }
    @media (max-width: 900px), (pointer: coarse) {
      .touch-controls {
        display: flex;
      }
    }
    @media (max-width: 520px) {
      .touch-btn {
        width: 68px;
        height: 68px;
        font-size: 26px;
      }
      .touch-btn.jump {
        width: 84px;
        height: 84px;
        font-size: 16px;
      }
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      text-align: center;
      padding: 20px;
    }
    .message {
      background: rgba(255,255,255,.92);
      padding: 20px 24px;
      border-radius: 22px;
      box-shadow: 0 20px 40px rgba(0,0,0,.16);
      max-width: 520px;
    }
    .message h2 {
      margin: 0 0 10px;
      font-size: clamp(24px, 4vw, 36px);
    }
    .message p { margin: 0; line-height: 1.7; }
    .canvas-wrap { position: relative; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">レトロ横スクロールアクション</h1>
    <p class="sub">左右移動・ジャンプ・敵を踏む・オーブ回収・ゴール到達まで入れた、クラシックゲーム風のオリジナル試作版です。</p>

    <div class="hud">
      <div class="pill">移動: ← → / A D</div>
      <div class="pill">ジャンプ: Space / W / ↑</div>
      <div class="pill">リスタート: R</div>
      <div class="pill">タブレット: 画面下のボタン</div>
    </div>

    <div class="game-shell">
      <div class="canvas-wrap">
        <canvas id="game" width="960" height="540"></canvas>
        <div class="overlay" id="overlay">
          <div class="message" id="messageBox">
            <h2>スタート！</h2>
            <p>右へ進んで、穴を飛び越え、敵を踏んで、オーブを集めてゴールへ。<br>何かキーを押すと始まります。</p>
          </div>
        </div>
      </div>

      <div class="controls">
        <div class="card">
          <strong>入っている要素</strong>
          足場、穴、敵、オーブ、ゴール、カメラ追従、残機、無敵時間
        </div>
        <div class="card">
          <strong>改造しやすいところ</strong>
          ステージ長さ、ジャンプ力、敵の数、見た目、BGM追加
        </div>
        <div class="card">
          <strong>次に足せるもの</strong>
          ブースト床、動く足場、パワーアップ、アニメーション、スマホ操作
        </div>
      </div>

      <div class="touch-controls" aria-label="タッチ操作ボタン">
        <div class="touch-left">
          <button class="touch-btn" data-key="ArrowLeft" aria-label="左へ移動">◀</button>
          <button class="touch-btn" data-key="ArrowRight" aria-label="右へ移動">▶</button>
        </div>
        <div class="touch-right">
          <button class="touch-btn jump" data-key="Space" aria-label="ジャンプ">JUMP</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const messageBox = document.getElementById('messageBox');

    const GRAVITY = 0.65;
    const FRICTION = 0.82;
    const WORLD_WIDTH = 5200;
    const GROUND_Y = 460;

    let keys = {};
    let touchButtonsBound = false;
    let gameStarted = false;
    let gameOver = false;
    let gameClear = false;
    let cameraX = 0;
    let coinsCollected = 0;
    let lives = 3;
    let score = 0;
    let invincibleTimer = 0;

    const player = {
      x: 100,
      y: 0,
      w: 34,
      h: 44,
      vx: 0,
      vy: 0,
      speed: 0.9,
      maxSpeed: 7,
      jumpPower: 14,
      onGround: false,
      facing: 1,
    };

    const platforms = [
      { x: 0, y: GROUND_Y, w: 900, h: 80 },
      { x: 1020, y: GROUND_Y, w: 520, h: 80 },
      { x: 1670, y: GROUND_Y, w: 650, h: 80 },
      { x: 2380, y: GROUND_Y, w: 340, h: 80 },
      { x: 2810, y: 390, w: 140, h: 26 },
      { x: 3020, y: 340, w: 160, h: 26 },
      { x: 3270, y: GROUND_Y, w: 680, h: 80 },
      { x: 4080, y: GROUND_Y, w: 620, h: 80 },
      { x: 4780, y: GROUND_Y, w: 420, h: 80 },
      { x: 4380, y: 360, w: 130, h: 26 },
      { x: 4550, y: 300, w: 130, h: 26 },
    ];

    let enemies = [];
    let coins = [];
    let goal = { x: 5040, y: 320, w: 20, h: 140 };

    function resetEntities() {
      enemies = [
        { x: 1180, y: 420, w: 34, h: 28, vx: -1.1, alive: true },
        { x: 1860, y: 420, w: 34, h: 28, vx: 1.1, alive: true },
        { x: 3450, y: 420, w: 34, h: 28, vx: -1.3, alive: true },
        { x: 4210, y: 420, w: 34, h: 28, vx: 1.4, alive: true },
      ];

      coins = [
        { x: 1110, y: 380, r: 10, taken: false },
        { x: 1280, y: 360, r: 10, taken: false },
        { x: 1750, y: 380, r: 10, taken: false },
        { x: 2110, y: 380, r: 10, taken: false },
        { x: 2860, y: 340, r: 10, taken: false },
        { x: 3090, y: 290, r: 10, taken: false },
        { x: 4400, y: 310, r: 10, taken: false },
        { x: 4590, y: 250, r: 10, taken: false },
        { x: 4860, y: 380, r: 10, taken: false },
      ];
    }

    function fullReset() {
      player.x = 100;
      player.y = 250;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      player.facing = 1;
      cameraX = 0;
      coinsCollected = 0;
      score = 0;
      lives = 3;
      invincibleTimer = 0;
      gameOver = false;
      gameClear = false;
      gameStarted = false;
      resetEntities();
      showMessage('スタート！', '右へ進んで、穴を飛び越え、敵を踏んで、オーブを集めてゴールへ。<br>何かキーを押すと始まります。');
    }

    function respawn() {
      player.x = Math.max(60, player.x - 180);
      player.y = 200;
      player.vx = 0;
      player.vy = 0;
      invincibleTimer = 120;
    }

    function showMessage(title, body) {
      messageBox.innerHTML = `<h2>${title}</h2><p>${body}</p>`;
      overlay.style.display = 'flex';
    }

    function hideMessage() {
      overlay.style.display = 'none';
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w &&
             a.x + a.w > b.x &&
             a.y < b.y + b.h &&
             a.y + a.h > b.y;
    }

    function circleRectOverlap(circle, rect) {
      const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
      const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
      const dx = circle.x - closestX;
      const dy = circle.y - closestY;
      return dx * dx + dy * dy < circle.r * circle.r;
    }

    function updatePlayer() {
      const left = keys['ArrowLeft'] || keys['KeyA'];
      const right = keys['ArrowRight'] || keys['KeyD'];
      const jump = keys['ArrowUp'] || keys['KeyW'] || keys['Space'];

      if (left) {
        player.vx -= player.speed;
        player.facing = -1;
      }
      if (right) {
        player.vx += player.speed;
        player.facing = 1;
      }

      player.vx *= FRICTION;
      if (player.vx > player.maxSpeed) player.vx = player.maxSpeed;
      if (player.vx < -player.maxSpeed) player.vx = -player.maxSpeed;

      if (jump && player.onGround) {
        player.vy = -player.jumpPower;
        player.onGround = false;
      }

      player.vy += GRAVITY;

      player.x += player.vx;
      if (player.x < 0) player.x = 0;
      if (player.x + player.w > WORLD_WIDTH) player.x = WORLD_WIDTH - player.w;

      player.y += player.vy;
      player.onGround = false;

      for (const p of platforms) {
        const prevBottom = player.y - player.vy + player.h;
        if (rectsOverlap(player, p)) {
          if (prevBottom <= p.y + 10 && player.vy >= 0) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.onGround = true;
          } else if (player.y >= p.y + p.h - 10 && player.vy < 0) {
            player.y = p.y + p.h;
            player.vy = 0;
          } else if (player.x + player.w / 2 < p.x + p.w / 2) {
            player.x = p.x - player.w;
            player.vx = 0;
          } else {
            player.x = p.x + p.w;
            player.vx = 0;
          }
        }
      }

      if (player.y > canvas.height + 200) {
        loseLife();
      }

      cameraX = player.x - canvas.width * 0.35;
      cameraX = Math.max(0, Math.min(cameraX, WORLD_WIDTH - canvas.width));

      if (invincibleTimer > 0) invincibleTimer--;
    }

    function updateEnemies() {
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        enemy.x += enemy.vx;

        let supported = false;
        for (const p of platforms) {
          const enemyFeetX = enemy.x + enemy.w / 2;
          const enemyBottom = enemy.y + enemy.h;
          if (enemyFeetX >= p.x && enemyFeetX <= p.x + p.w && Math.abs(enemyBottom - p.y) < 6) {
            supported = true;
          }

          if (rectsOverlap(enemy, p)) {
            if (enemy.vx > 0) enemy.x = p.x - enemy.w;
            else enemy.x = p.x + p.w;
            enemy.vx *= -1;
          }
        }

        if (!supported) enemy.vx *= -1;

        if (rectsOverlap(player, enemy)) {
          const stomp = player.vy > 0 && (player.y + player.h - enemy.y) < 20;
          if (stomp) {
            enemy.alive = false;
            player.vy = -9;
            score += 100;
          } else if (invincibleTimer === 0) {
            loseLife();
          }
        }
      }
    }

    function updateCoins() {
      for (const coin of coins) {
        if (coin.taken) continue;
        if (circleRectOverlap(coin, player)) {
          coin.taken = true;
          coinsCollected++;
          score += 50;
        }
      }
    }

    function updateGoal() {
      const flagHitbox = { x: goal.x - 10, y: goal.y, w: 40, h: goal.h };
      if (rectsOverlap(player, flagHitbox)) {
        gameClear = true;
        gameStarted = false;
        showMessage('クリア！', `スコア: ${score}<br>オーブ: ${coinsCollected}枚<br><br>Rキーでもう一度遊べます。`);
      }
    }

    function loseLife() {
      if (gameOver || gameClear) return;
      lives--;
      if (lives <= 0) {
        gameOver = true;
        gameStarted = false;
        showMessage('ゲームオーバー', `スコア: ${score}<br>オーブ: ${coinsCollected}枚<br><br>Rキーでやり直し。`);
      } else {
        respawn();
      }
    }

    function drawBackground() {
      const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      skyGrad.addColorStop(0, '#7dd3fc');
      skyGrad.addColorStop(0.68, '#d9f99d');
      skyGrad.addColorStop(0.68, '#86efac');
      skyGrad.addColorStop(1, '#4ade80');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const hillOffset1 = -(cameraX * 0.2) % 1200;
      const hillOffset2 = -(cameraX * 0.4) % 800;

      ctx.fillStyle = '#7ccf6b';
      for (let i = -1; i < 4; i++) {
        const x = hillOffset1 + i * 420;
        ctx.beginPath();
        ctx.arc(x + 140, 430, 180, Math.PI, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = '#4fa95c';
      for (let i = -1; i < 5; i++) {
        const x = hillOffset2 + i * 280;
        ctx.beginPath();
        ctx.arc(x + 100, 470, 120, Math.PI, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = 'rgba(255,255,255,.85)';
      for (let i = 0; i < 6; i++) {
        const cx = ((i * 220) - (cameraX * 0.15)) % (canvas.width + 220);
        drawCloud((cx + canvas.width + 220) % (canvas.width + 220) - 110, 70 + (i % 3) * 40);
      }
    }

    function drawCloud(x, y) {
      ctx.beginPath();
      ctx.arc(x, y, 24, 0, Math.PI * 2);
      ctx.arc(x + 25, y - 14, 20, 0, Math.PI * 2);
      ctx.arc(x + 52, y, 24, 0, Math.PI * 2);
      ctx.arc(x + 25, y + 6, 24, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPlatforms() {
      for (const p of platforms) {
        const x = p.x - cameraX;
        ctx.fillStyle = p.h > 40 ? '#8b5a2b' : '#b7791f';
        ctx.fillRect(x, p.y, p.w, p.h);
        ctx.fillStyle = '#6ee7b7';
        ctx.fillRect(x, p.y, p.w, 10);
        for (let i = 0; i < p.w; i += 32) {
          ctx.strokeStyle = 'rgba(0,0,0,.08)';
          ctx.strokeRect(x + i, p.y + 12, 30, Math.max(10, p.h - 14));
        }
      }
    }

    function drawPlayer() {
      const x = player.x - cameraX;
      if (invincibleTimer > 0 && Math.floor(invincibleTimer / 6) % 2 === 0) return;

      ctx.fillStyle = '#7c3aed';
      ctx.fillRect(x + 6, player.y, 22, 12);
      ctx.fillStyle = '#fde68a';
      ctx.fillRect(x + 8, player.y + 10, 18, 12);
      ctx.fillStyle = '#06b6d4';
      ctx.fillRect(x + 4, player.y + 22, 26, 18);
      ctx.fillStyle = '#111827';
      ctx.fillRect(x + (player.facing === 1 ? 20 : 10), player.y + 14, 4, 4);
      ctx.fillStyle = '#334155';
      ctx.fillRect(x + 2, player.y + 40, 10, 4);
      ctx.fillRect(x + 22, player.y + 40, 10, 4);
    }

    function drawEnemies() {
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        const x = enemy.x - cameraX;
        ctx.fillStyle = '#334155';
        ctx.beginPath();
        ctx.roundRect(x, enemy.y, enemy.w, enemy.h, 10);
        ctx.fill();
        ctx.fillStyle = '#111827';
        ctx.fillRect(x + 7, enemy.y + 8, 4, 4);
        ctx.fillRect(x + 23, enemy.y + 8, 4, 4);
        ctx.fillStyle = '#fef3c7';
        ctx.fillRect(x + 6, enemy.y + 22, 22, 3);
      }
    }

    function drawCoins() {
      for (const coin of coins) {
        if (coin.taken) continue;
        const x = coin.x - cameraX;
        ctx.fillStyle = '#a3e635';
        ctx.beginPath();
        ctx.ellipse(x, coin.y, coin.r * 0.8, coin.r, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#65a30d';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,.7)';
        ctx.beginPath();
        ctx.moveTo(x, coin.y - 7);
        ctx.lineTo(x, coin.y + 7);
        ctx.stroke();
      }
    }

    function drawGoal() {
      const poleX = goal.x - cameraX;
      ctx.fillStyle = '#e5e7eb';
      ctx.fillRect(poleX, goal.y, goal.w, goal.h);
      ctx.fillStyle = '#8b5cf6';
      ctx.beginPath();
      ctx.moveTo(poleX + goal.w, goal.y + 12);
      ctx.lineTo(poleX + goal.w + 60, goal.y + 28);
      ctx.lineTo(poleX + goal.w, goal.y + 44);
      ctx.closePath();
      ctx.fill();
    }

    function drawHUD() {
      ctx.fillStyle = 'rgba(255,255,255,.9)';
      ctx.beginPath();
      ctx.roundRect(18, 18, 270, 72, 18);
      ctx.fill();
      ctx.fillStyle = '#111827';
      ctx.font = 'bold 24px system-ui';
      ctx.fillText(`SCORE ${score}`, 34, 46);
      ctx.fillText(`ORB ${coinsCollected}`, 34, 74);
      ctx.fillText(`LIFE ${lives}`, 172, 74);
    }

    function draw() {
      drawBackground();
      drawPlatforms();
      drawCoins();
      drawGoal();
      drawEnemies();
      drawPlayer();
      drawHUD();
    }

    function loop() {
      if (gameStarted && !gameOver && !gameClear) {
        updatePlayer();
        updateEnemies();
        updateCoins();
        updateGoal();
      }
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (!gameStarted && !gameOver && !gameClear) {
        gameStarted = true;
        hideMessage();
      }
      if (e.code === 'KeyR') {
        fullReset();
      }
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(e.code)) {
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    function setVirtualKey(code, isPressed) {
      keys[code] = isPressed;
      if (isPressed && !gameStarted && !gameOver && !gameClear) {
        gameStarted = true;
        hideMessage();
      }
    }

    function bindTouchControls() {
      if (touchButtonsBound) return;
      touchButtonsBound = true;

      const buttons = document.querySelectorAll('[data-key]');
      for (const btn of buttons) {
        const code = btn.dataset.key;

        const press = (e) => {
          e.preventDefault();
          setVirtualKey(code, true);
        };

        const release = (e) => {
          e.preventDefault();
          setVirtualKey(code, false);
        };

        btn.addEventListener('pointerdown', press);
        btn.addEventListener('pointerup', release);
        btn.addEventListener('pointercancel', release);
        btn.addEventListener('pointerleave', release);
        btn.addEventListener('touchstart', press, { passive: false });
        btn.addEventListener('touchend', release, { passive: false });
      }
    }

    resetEntities();
    bindTouchControls();
    fullReset();
    loop();
  </script>
</body>
</html>
